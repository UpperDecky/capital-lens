server {
    listen 80;
    server_name _;

    # Serve React frontend
    root /var/www/capital-lens;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    # API proxy → FastAPI
    location /feed        { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location /entities    { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location /themes      { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location /search      { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location /auth        { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location /health      { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location /docs        { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }

    # SPA fallback — all other requests serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
